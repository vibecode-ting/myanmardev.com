<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <defs>
    <linearGradient id="cardBg3" x1="0" y1="0" x2="320" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#12151A"/>
      <stop offset="100%" stop-color="#0B0D10"/>
    </linearGradient>
  </defs>

  <rect width="320" height="200" rx="12" fill="url(#cardBg3)" stroke="#1D232B" stroke-width="1"/>

  <!-- Profile/Portfolio icon -->
  <!-- Screen -->
  <rect x="115" y="35" width="90" height="65" rx="5" stroke="#73a5f9" stroke-width="1.5" fill="none"/>
  <!-- Avatar circle -->
  <circle cx="145" cy="58" r="10" stroke="#73a5f9" stroke-width="1" fill="none"/>
  <!-- Name lines -->
  <rect x="162" y="52" width="35" height="5" rx="2" fill="#73a5f9" opacity="0.3"/>
  <rect x="162" y="62" width="25" height="4" rx="2" fill="#73a5f9" opacity="0.15"/>
  <!-- Project cards -->
  <rect x="122" y="78" width="22" height="15" rx="2" fill="#73a5f9" opacity="0.12"/>
  <rect x="148" y="78" width="22" height="15" rx="2" fill="#73a5f9" opacity="0.12"/>
  <rect x="174" y="78" width="22" height="15" rx="2" fill="#73a5f9" opacity="0.12"/>

  <!-- Floating code bracket -->
  <text x="90" y="70" font-family="'JetBrains Mono', monospace" font-size="20" fill="#73a5f9" opacity="0.2">{ }</text>
  <text x="215" y="65" font-family="'JetBrains Mono', monospace" font-size="16" fill="#73a5f9" opacity="0.15">&lt;/&gt;</text>

  <!-- Text -->
  <text x="160" y="130" text-anchor="middle" font-family="'Sora', sans-serif" font-size="14" fill="#E7EAEE">Developer Portfolio</text>

  <!-- Coming soon badge -->
  <rect x="120" y="145" width="80" height="20" rx="10" fill="#73a5f9" opacity="0.15"/>
  <text x="160" y="158" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#73a5f9">Coming Soon</text>

  <text x="160" y="185" text-anchor="middle" font-family="'Sora', sans-serif" font-size="12" fill="#5B6470">2 Tokens</text>
</svg>