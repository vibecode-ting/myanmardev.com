<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="150" x2="1200" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#73a5f9" stop-opacity="0"/>
      <stop offset="10%" stop-color="#73a5f9" stop-opacity="0.6"/>
      <stop offset="90%" stop-color="#73a5f9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#73a5f9" stop-opacity="0"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="horizonGlow" cx="1100" cy="150" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#73a5f9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#73a5f9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Horizon glow -->
  <rect width="1200" height="300" fill="url(#horizonGlow)"/>

  <!-- Main timeline line -->
  <line x1="50" y1="150" x2="1150" y2="150" stroke="url(#lineGrad)" stroke-width="2"/>

  <!-- Milestone nodes -->
  <!-- Node 1: Subdomain (active) -->
  <g filter="url(#nodeGlow)">
    <circle cx="150" cy="150" r="8" fill="#73a5f9"/>
    <circle cx="150" cy="150" r="12" stroke="#73a5f9" stroke-width="1" fill="none" opacity="0.4"/>
  </g>
  <text x="150" y="120" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#73a5f9">Subdomains</text>
  <text x="150" y="185" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5B6470">Available</text>

  <!-- Node 2: Website Builder -->
  <circle cx="320" cy="150" r="6" fill="#73a5f9" opacity="0.5"/>
  <circle cx="320" cy="150" r="10" stroke="#73a5f9" stroke-width="1" fill="none" opacity="0.2"/>
  <text x="320" y="120" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5B6470">Website Builder</text>
  <text x="320" y="185" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5B6470">Q3 2026</text>

  <!-- Node 3: Portfolio -->
  <circle cx="460" cy="150" r="6" fill="#73a5f9" opacity="0.5"/>
  <circle cx="460" cy="150" r="10" stroke="#73a5f9" stroke-width="1" fill="none" opacity="0.2"/>
  <text x="460" y="120" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5B6470">Portfolio</text>
  <text x="460" y="185" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5B6470">Q3 2026</text>

  <!-- Node 4: Business Website -->
  <circle cx="600" cy="150" r="6" fill="#73a5f9" opacity="0.4"/>
  <circle cx="600" cy="150" r="10" stroke="#73a5f9" stroke-width="1" fill="none" opacity="0.15"/>
  <text x="600" y="120" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5B6470">Business</text>
  <text x="600" y="185" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5B6470">Q4 2026</text>

  <!-- Node 5: Restaurant QR -->
  <circle cx="740" cy="150" r="5" fill="#73a5f9" opacity="0.3"/>
  <circle cx="740" cy="150" r="9" stroke="#73a5f9" stroke-width="1" fill="none" opacity="0.1"/>
  <text x="740" y="120" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5B6470">QR Menu</text>
  <text x="740" y="185" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5B6470">Q4 2026</text>

  <!-- Node 6: Online Ordering -->
  <circle cx="880" cy="150" r="5" fill="#73a5f9" opacity="0.25"/>
  <circle cx="880" cy="150" r="9" stroke="#73a5f9" stroke-width="1" fill="none" opacity="0.08"/>
  <text x="880" y="120" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5B6470">Ordering</text>
  <text x="880" y="185" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5B6470">2027</text>

  <!-- Node 7: Education -->
  <circle cx="1020" cy="150" r="4" fill="#73a5f9" opacity="0.2"/>
  <circle cx="1020" cy="150" r="8" stroke="#73a5f9" stroke-width="1" fill="none" opacity="0.06"/>
  <text x="1020" y="120" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5B6470">Education</text>
  <text x="1020" y="185" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#5B6470">2027</text>

  <!-- Horizon glow point -->
  <circle cx="1100" cy="150" r="20" fill="#73a5f9" opacity="0.06"/>
  <circle cx="1100" cy="150" r="40" fill="#73a5f9" opacity="0.03"/>

  <!-- Stars -->
  <g fill="#73a5f9" opacity="0.15">
    <circle cx="100" cy="50" r="1.5"/>
    <circle cx="250" cy="80" r="1"/>
    <circle cx="500" cy="40" r="1.5"/>
    <circle cx="700" cy="70" r="1"/>
    <circle cx="900" cy="45" r="1.5"/>
    <circle cx="1050" cy="65" r="1"/>
  </g>
</svg>